name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          curl -X POST https://api.vercel.com/v13/deployments \
            -H "Authorization: Bearer ${{ secrets.VERCEL_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "evolution-report",
              "gitSource": {
                "type": "github",
                "repo": "zhanbo-beep/evolution-report",
                "branch": "main",
                "commitSha": "${{ github.sha }}"
              },
              "projectSettings": {
                "framework": null,
                "buildCommand": null,
                "outputDirectory": ".",
                "installCommand": null
              }
            }' 2>&1 | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('Deployment URL:', d.get('url','ERROR'))
print('Status:', d.get('readyState','UNKNOWN'))
"
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
